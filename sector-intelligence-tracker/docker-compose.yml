version: '3.8'

services:
  db:
    image: postgres:15
    container_name: sector_intel_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sector_intel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: sector_intel_api
    environment:
      DATABASE_URL: "postgresql://user:password@db:5432/sector_intel"
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
